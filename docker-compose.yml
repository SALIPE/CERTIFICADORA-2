services:
  postgres:
      image: postgres:16-alpine
      container_name: furiosos_postgres
      restart: unless-stopped
      environment:
        POSTGRES_DB: furiosos_db
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
      ports:
        - 5432:5432
      volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./tabelas.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-furiosos_db}"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@furiosos.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - 5050:80
    volumes:
      - pgadmin_data:/var/lib/pgadmin
  # app:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile.run
  #   depends_on:
  #     - postgres
  #   ports:
  #     - 8080:8080

volumes:
  postgres_data:
  pgadmin_data: